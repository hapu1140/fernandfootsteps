<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request a Call Back — Fern &amp; Footsteps Travels</title>
  <meta name="description" content="Request a callback from Fern & Footsteps Travels." />
  <style>
    :root{
      --brand:#0ea5a4;
      --brand2:#156d36;
      --ink:#0f172a;
      --muted:#64748b;
      --bg:#ffffff;
      --card:#f8fafc;
      --line:#e2e8f0;
      --shadow: 0 12px 30px rgba(2,6,23,.08);
      --radius: 16px;
      --max: 780px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--ink);
      background:
        radial-gradient(900px 500px at 20% 20%, rgba(14,165,164,.18), transparent 55%),
        radial-gradient(900px 500px at 80% 30%, rgba(22,163,74,.14), transparent 55%),
        var(--bg);
      line-height:1.5;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .bg-site{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      opacity:.12;
      pointer-events:none;
      z-index:-1;
    }
    .wrap{position:relative; z-index:1; width:min(var(--max), 100%)}
    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow: 0 20px 50px rgba(2,6,23,.15);
      overflow:hidden;
    }
    .top{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:linear-gradient(180deg, rgba(14,165,164,.10), rgba(22,163,74,.06));
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:900;
      text-decoration:none;
      color:var(--ink);
    }
    .logo{
      width:40px; height:40px; border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      box-shadow: 0 10px 20px rgba(14,165,164,.18);
    }
    .body{padding:18px}
    h1{margin:0 0 6px; font-size:24px}
    .sub{margin:0 0 14px; color:var(--muted); font-size:14px}
    label{display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; font-weight:800}
    input{
      width:100%;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      font:inherit;
      outline:none;
    }
    input:focus{
      border-color: rgba(14,165,164,.65);
      box-shadow: 0 0 0 4px rgba(14,165,164,.14);
    }
    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:11px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      text-decoration:none;
      font-weight:800;
      cursor:pointer;
    }
    .btn-primary{
      border:none;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;
      box-shadow: 0 12px 22px rgba(2,6,23,.12);
    }
    .note{margin-top:10px; font-size:12px; color:var(--muted)}
  </style>
</head>

<body>
  <iframe class="bg-site" src="main.html"></iframe>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <a class="brand" href="main.html">
          <div class="logo" aria-hidden="true"></div>
          <span>Fern &amp; Footsteps Travels</span>
        </a>
        <a class="btn" href="main.html">Skip</a>
      </div>

      <div class="body">
        <h1>Request a Call Back</h1>
        <p class="sub">Enter your details and we’ll call you as soon as possible.</p>

        <!-- Uses your Formspree -->
        <form action="https://formspree.io/f/mvzqvbbk" method="POST">
          <input type="hidden" name="form_type" value="callback_request" />

          <label for="name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />

          <label for="phone">Phone number</label>
          <input id="phone" name="phone" type="tel" placeholder="+91 98xxxxxx" required />

          <div class="actions">
            <button class="btn btn-primary" type="submit">Request Call</button>
            <a class="btn" href="index.html">Go to Website</a>
          </div>

          <p class="note">We respect your privacy. No spam.</p>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Optional: Focus cursor into name field
    window.addEventListener("load", () => {
      document.getElementById("name")?.focus();
    });
  </script>
</body>
</html>
